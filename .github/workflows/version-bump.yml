name: Bump version and tag

# On every push to main, bump the patch version in the two places that carry it
# (runelite-plugin.properties and OSPartyPanel.java), commit the bump, and tag that
# commit vX.Y.Z — so every state of main has a matching tag.
#
# Loop safety: the bump is pushed with a PAT (RELEASE_TOKEN), which — unlike the default
# GITHUB_TOKEN — DOES re-trigger workflows. The "[skip ci]" marker in the bump commit is the
# real guard: GitHub skips a run when the head commit message contains it. The `if` below is
# belt-and-braces.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history, and check out with the PAT so the push back to main can bypass
          # the branch ruleset (the PAT acts as a repo admin on the bypass list).
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          set -euo pipefail
          prop=runelite-plugin.properties
          panel=src/main/java/net/osparty/ui/OSPartyPanel.java

          current=$(grep -E '^version=' "$prop" | head -n1 | cut -d= -f2)
          IFS='.' read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "Bumping $current -> $next"

          sed -i -E "s/^version=.*/version=${next}/" "$prop"
          sed -i -E "s/(private static final String VERSION = \")[^\"]*(\";)/\1${next}\2/" "$panel"

          # Fail loudly if either file didn't end up on the new version.
          grep -q "^version=${next}$" "$prop"
          grep -q "VERSION = \"${next}\";" "$panel"

          echo "version=${next}" >> "$GITHUB_OUTPUT"

      - name: Commit, tag and push
        env:
          NEXT: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add runelite-plugin.properties src/main/java/net/osparty/ui/OSPartyPanel.java
          git commit -m "chore: bump version to ${NEXT} [skip ci]"
          git tag "v${NEXT}"

          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${NEXT}"
